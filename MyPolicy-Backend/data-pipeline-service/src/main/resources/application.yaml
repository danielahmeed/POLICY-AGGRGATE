# ========================================
# Data Pipeline Service Configuration
# ========================================
# Consolidated service containing:
#   - Ingestion Module (Port 8082)
#   - Metadata Module
#   - Processing Module
#   - Matching Engine Module
# ========================================

server:
  port: 8081

spring:
  config:
    import: optional:configserver:http://admin:config123@localhost:8888
  application:
    name: data-pipeline-service

  # ========================================
  # PostgreSQL Configuration (Metadata Module)
  # ========================================
  datasource:
    url: jdbc:postgresql://localhost:5432/mypolicy_db
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ========================================
  # MongoDB Configuration (Ingestion Module)
  # ========================================
  data:
    mongodb:
      uri: mongodb://localhost:27017/ingestion_db
      database: ingestion_db

  # ========================================
  # File Upload Configuration (Ingestion Module)
  # ========================================
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# ========================================
# Logging Configuration
# ========================================
logging:
  level:
    root: INFO
    com.mypolicy.pipeline: DEBUG
    org.springframework.cloud.openfeign: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# ========================================
# Actuator Configuration
# ========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
