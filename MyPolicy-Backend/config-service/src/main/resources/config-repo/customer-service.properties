# ============================================
# Customer Service Configuration (from Config Server)
# ============================================

server.port=8087
spring.application.name=customer-service

# ============================================
# MongoDB Database Configuration
# ============================================
# MongoDB URI is set via environment variable or customer-service's application.yaml
# Do NOT define it here — config server resolves placeholders server-side.
spring.data.mongodb.database=Backend_databases

# ============================================
# Logging
# ============================================
logging.level.com.mypolicy.customer=INFO

# ============================================
# Actuator
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================
# Eureka Discovery
# ============================================
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
