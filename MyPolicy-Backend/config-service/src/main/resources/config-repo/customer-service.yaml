# ============================================
# Customer Service Configuration (from Config Server)
# ============================================

server:
  port: 8087

spring:
  application:
    name: customer-service

  # ============================================
  # MongoDB Database Configuration
  # ============================================
  # MongoDB URI is set via environment variable or customer-service's application.yaml
  # Do NOT define it here — config server resolves placeholders server-side,
  # which would ignore the client's SPRING_DATA_MONGODB_URI env var.
  data:
    mongodb:
      database: Backend_databases

# ============================================
# Logging
# ============================================
logging:
  level:
    com.mypolicy.customer: INFO

# ============================================
# Actuator
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
