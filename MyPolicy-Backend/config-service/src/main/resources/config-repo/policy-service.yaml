# ============================================
# Policy Service Configuration (from Config Server)
# ============================================

server:
  port: 8085

spring:
  application:
    name: policy-service

  # ============================================
  # MongoDB Database Configuration
  # ============================================
  # MongoDB URI is set via environment variable or the service's application.yaml
  # Do NOT define it here — config server resolves placeholders server-side.
  data:
    mongodb:
      database: mypolicy

# ============================================
# Logging
# ============================================
logging:
  level:
    com.mypolicy.policy: INFO

# ============================================
# Actuator
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
